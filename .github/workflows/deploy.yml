name: Deploy backend to AWS Singapore (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executing remote ssh commands using SSH Key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
                      cd /home/ubuntu/lito-backend
                      git clean -fd
                      git checkout .
                      git pull origin main

                      # 1. Build lại image mới
                      docker build -t lito-backend .

                      # 2. Dọn dẹp container cũ nếu có
                      docker stop lito-container || true
                      docker rm lito-container || true

                      # 3. CỰC KỲ QUAN TRỌNG: Đảm bảo cổng 8000 hoàn toàn trống
                      # Lệnh này sẽ tìm và "tiêu diệt" bất kỳ tiến trình nào đang chiếm cổng 8000
                      sudo fuser -k 8000/tcp || true

                      # 4. Chạy container mới với chế độ tự hồi sinh
                      docker run -d --name lito-container \
                        --restart always \
                        -p 8000:8000 \
                        lito-backend
